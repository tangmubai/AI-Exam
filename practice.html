<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>模拟测试 · AI 课程题库练习</title>
  <script>
    // Apply the saved (or system) theme before first paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem("ai-course-theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="返回首页">
      <span class="brand-mark">AI</span>
      <span>课程题库练习</span>
    </a>
    <div class="top-actions">
      <div class="top-stats">
        <span>已答 <strong id="answeredStat">0</strong></span>
        <span>错题 <strong id="wrongStat">0</strong></span>
      </div>
      <button id="themeToggle" class="icon-button" type="button" aria-label="切换深色模式">🌙</button>
    </div>
  </header>

  <main class="shell">
    <!-- 组卷配置 -->
    <section id="configView" class="view">
      <div class="hero">
        <p class="eyebrow">模拟测试</p>
        <h1>自定义组卷，模拟考试。</h1>
        <p class="hero-copy">选择考试范围与各题型数量，系统从范围内随机抽题组成试卷。交卷后自动判分，错题去重后加入错题集。</p>
      </div>

      <div class="config-grid">
        <section class="config-card">
          <div class="config-card-head">
            <h2>考试范围</h2>
            <div class="scope-actions">
              <button id="scopeAll" class="text-button" type="button">全选</button>
              <button id="scopeNone" class="text-button" type="button">清空</button>
            </div>
          </div>
          <div id="scopeList" class="scope-list"></div>
        </section>

        <section class="config-card">
          <div class="config-card-head">
            <h2>题型与数量</h2>
            <button id="fillRandom" class="text-button" type="button">智能填满</button>
          </div>
          <div id="typeList" class="type-list"></div>
          <label class="shuffle-row">
            <input type="checkbox" id="shuffleOrder" checked> 打乱题目顺序
          </label>
          <div class="config-summary">本卷共 <strong id="totalCount">0</strong> 题</div>
          <button id="startExam" class="button primary" type="button">开始测试</button>
          <p id="configError" class="config-error hidden"></p>
        </section>
      </div>
    </section>

    <!-- 答题 -->
    <section id="examView" class="view hidden">
      <div class="practice-header">
        <button id="quitExam" class="text-button" type="button">← 退出测试</button>
        <span class="mode-label">模拟测试</span>
      </div>

      <div class="progress-row">
        <div class="progress-track"><div id="examProgressBar" class="progress-bar"></div></div>
        <span id="examProgressText"></span>
      </div>

      <div class="exam-layout">
        <article class="question-card">
          <div class="question-meta">
            <span id="examTypeBadge" class="badge"></span>
            <span id="examSourceLabel"></span>
            <a id="examPdfLink" target="_blank" rel="noopener">查看原 PDF</a>
          </div>
          <h2 id="examPrompt"></h2>
          <div id="examAnswerArea" class="answer-area"></div>
          <p id="examHint" class="grading-hint hidden"></p>
          <div class="question-actions">
            <button id="examPrev" class="text-button" type="button">← 上一题</button>
            <button id="examClear" class="text-button" type="button">清除本题</button>
            <button id="examNext" class="button primary" type="button">下一题</button>
          </div>
        </article>

        <aside class="palette-card">
          <div class="palette-head">
            <h3>答题卡</h3>
            <span id="answeredCount" class="palette-count"></span>
          </div>
          <div id="palette" class="palette"></div>
          <button id="submitExam" class="button primary" type="button">交卷</button>
        </aside>
      </div>
    </section>

    <!-- 成绩与解析 -->
    <section id="resultView" class="view hidden">
      <article class="result-summary">
        <p class="eyebrow">测试完成</p>
        <div class="score-ring">
          <span id="scoreValue">0</span>
          <span class="score-unit">分</span>
        </div>
        <p id="resultSummaryText" class="result-summary-text"></p>
        <div id="resultBreakdown" class="result-breakdown"></div>
        <div class="result-actions">
          <a href="/" class="button secondary">返回首页</a>
          <button id="retryExam" class="button primary" type="button">再考一次</button>
        </div>
      </article>

      <div class="review-head">
        <h2>逐题解析</h2>
        <div class="review-filter">
          <button id="filterAll" class="chip active" type="button">全部</button>
          <button id="filterWrong" class="chip" type="button">仅错题</button>
        </div>
      </div>
      <div id="reviewList" class="review-list"></div>
    </section>

    <footer class="site-legal" aria-label="许可声明">
      <div class="site-legal-text">
        <p>
          本页面的全部内容在 <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.en">CC BY-SA 4.0</a>及<a href="https://opensource.org/license/mit">MIT License</a>协议之条款下提供，附加条款亦可能应用。
        </p>
        <p>
          Copyright © 2026 sj-tu.com.
        </p>
      </div>
      <a class="site-legal-github" href="https://github.com/tangmubai/SJTU-AI-Course" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        <span>GitHub</span>
      </a>
    </footer>
  </main>

  <script src="questions.js"></script>
  <script src="practice.js"></script>
</body>
</html>
